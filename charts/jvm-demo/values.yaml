# Default values for jvm-demo.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 2

image:
  repository: registry.example.com/jvm-demo
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  hosts:
    - host: jvm-demo.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

javaOpts: "-Xms512m -Xmx1024m"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Stable Version Configuration
# 稳定版版本，线上已运行的版本，灰度发布时不会重新部署
stable:
  version: v1

# Canary Release Configuration
canary:
  enabled: false
  weight: 10
  version: v2

# Prometheus monitoring
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    path: /actuator/prometheus

# Canary Auto Controller
canaryController:
  enabled: false
  image:
    repository: python
    tag: 3.11-slim
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  config:
    prometheusUrl: "http://prometheus:9090"
    pollInterval: 30
    errorRateThreshold: 5.0
    latencyThresholdMs: 500.0
    memoryUsageThreshold: 80.0
    autoRollback: true
    autoRollbackErrors: 3
    minWeight: 5
    maxWeight: 100
    weightStep: 10

# Prometheus AlertManager Config
prometheus:
  additionalScrapeConfigs: []
  additionalAlertRules: []

# Grafana dashboards
grafana:
  dashboards:
    enabled: true
    jvmDemo:
      enabled: true
      file: monitoring/grafana/dashboards/jvm-demo.json
