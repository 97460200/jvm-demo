global:
  resolve_timeout: 5m

route:
  receiver: "default"
  group_by: ["alertname", "job"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  
  routes:
    - match:
        severity: critical
      receiver: "critical-alerts"
      continue: true
      group_wait: 10s
    
    - match:
        canary: "true"
      receiver: "canary-alerts"
      continue: true
      group_wait: 10s
    
    - match:
        severity: warning
      receiver: "warning-alerts"
      continue: true

receivers:
  - name: "default"
    webhook_configs:
      - url: "http://webhook-receiver:8080/alerts"
        send_resolved: true
  
  - name: "critical-alerts"
    webhook_configs:
      - url: "http://webhook-receiver:8080/alerts/critical"
        send_resolved: true
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#alerts-critical"
        username: "Alertmanager"
        icon_url: "https://avatars3.githubusercontent.com/u/3380462"
        text: |-
          *CRITICAL*: {{ .CommonAnnotations.summary }}
          Description: {{ .CommonAnnotations.description }}
          Details: {{ range .Alerts }}{{ range .Labels.SortedPairs }} - {{ .Name }}: {{ .Value }}{{ end }}{{ end }}
  
  - name: "warning-alerts"
    webhook_configs:
      - url: "http://webhook-receiver:8080/alerts/warning"
        send_resolved: true
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#alerts-warning"
        username: "Alertmanager"
        icon_url: "https://avatars3.githubusercontent.com/u/3380462"
        text: |-
          *WARNING*: {{ .CommonAnnotations.summary }}
          Description: {{ .CommonAnnotations.description }}
  
  - name: "canary-alerts"
    webhook_configs:
      - url: "http://canary-controller:8080/alerts"
        send_resolved: true
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#canary-deployment"
        username: "Alertmanager"
        icon_url: "https://avatars3.githubusercontent.com/u/3380462"
        text: |-
          *CANARY ALERT*: {{ .CommonAnnotations.summary }}
          Description: {{ .CommonAnnotations.description }}
          {{ if eq .CommonLabels.severity "critical" }}⚠️ *ACTION REQUIRED*: Consider rolling back the canary deployment{{ end }}

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "job"]
